name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIMCHI_API_KEY: ${{ secrets.KIMCHI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark (json)
        continue-on-error: true
        run: python benchmark.py --format json

      - name: Run benchmark (html)
        continue-on-error: true
        run: python benchmark.py --format html

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update benchmark results [actions]"
            git push
          fi
